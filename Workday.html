<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設計部 工作日報 - 多人檢視</title>
<style>
  :root {
    --c-primary:#1f4e79;
    --c-accent:#ed7d31;
    --c-soft:#f4f6f9;
    --c-line:#d8dee6;
    --c-done:#70ad47;
    --c-warn:#c00000;
    --c-text:#222;
  }
  * { box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
    color:var(--c-text); margin:0; padding:0;
    background:#fafbfc; line-height:1.7;
  }
  .wrap { max-width:1360px; margin:0 auto; padding:24px 20px 80px; }
  /* Login gate */
  .login-gate {
    position:fixed; inset:0; z-index:9999;
    background:linear-gradient(135deg,var(--c-primary),#5a9bd2);
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .login-card {
    background:#fff; padding:30px 36px; border-radius:14px;
    box-shadow:0 12px 40px rgba(0,0,0,.2); width:min(380px,92vw);
  }
  .login-card h2 { margin:0 0 6px; color:var(--c-primary); text-align:center; font-size:22px; }
  .login-card .login-sub { text-align:center; color:#64748b; font-size:13px; margin-bottom:22px; }
  .login-field { margin-bottom:14px; }
  .login-field label { display:block; font-size:13px; color:#475569; margin-bottom:5px; }
  .login-field select, .login-field input[type=password] {
    width:100%; padding:9px 12px; border:1px solid var(--c-line); border-radius:6px; font:inherit;
  }
  .login-field select:focus, .login-field input[type=password]:focus {
    outline:none; border-color:var(--c-primary);
  }
  .login-msg { font-size:13px; color:#b42318; min-height:1.4em; margin-bottom:10px; }
  .login-card .btn { width:100%; padding:10px; font-weight:600; }
  a { color:var(--c-primary); text-decoration:none; word-break:break-all; }
  a:hover { text-decoration:underline; }
  .page-nav {
    display:flex; gap:6px; margin-bottom:14px;
    background:#fff; border:1px solid var(--c-line);
    border-radius:10px; padding:6px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
    flex-wrap:wrap;
  }
  .page-nav a {
    flex:1 1 0; text-align:center; min-width:90px;
    padding:9px 14px; border-radius:7px;
    font-size:13.5px; font-weight:600;
    color:var(--c-primary);
    transition:background .2s,color .2s,box-shadow .2s;
  }
  .page-nav a:hover { background:var(--c-soft); text-decoration:none; }
  .page-nav a.active {
    background:linear-gradient(120deg,var(--c-primary),#2c6ea8);
    color:#fff; box-shadow:0 2px 6px rgba(31,78,121,.25);
  }
  header {
    background:linear-gradient(120deg,var(--c-primary),#2c6ea8);
    color:#fff; padding:24px 28px 20px;
    border-radius:10px;
    box-shadow:0 4px 18px rgba(31,78,121,.18);
    margin-bottom:18px;
  }
  header h1 { margin:0 0 4px; font-size:24px; letter-spacing:1px; }
  header .meta { font-size:13px; opacity:.9; }

  /* sync bar */
  .sync-bar {
    display:flex; justify-content:space-between; align-items:center;
    background:#fff; border:1px solid var(--c-line);
    border-radius:8px; padding:8px 14px; margin-bottom:12px;
    font-size:13px; flex-wrap:wrap; gap:10px;
  }
  .sync-bar .status[data-level="ok"]   { color:#137333; }
  .sync-bar .status[data-level="busy"] { color:#92400e; }
  .sync-bar .status[data-level="err"]  { color:#b42318; }
  .sync-bar .status[data-level="info"] { color:#475569; }
  .sync-bar .btns { display:flex; gap:6px; flex-wrap:wrap; }
  .btn {
    border:1px solid var(--c-line); background:#fff;
    padding:6px 12px; border-radius:6px; font-size:13px;
    cursor:pointer; color:var(--c-text);
    font-family:inherit;
    transition:background .15s,border-color .15s;
  }
  .btn:hover { background:var(--c-soft); }

  /* tab nav */
  .tab-nav {
    display:flex; gap:6px; margin-bottom:18px;
    background:#fff; border:1px solid var(--c-line);
    border-radius:10px; padding:6px;
    flex-wrap:wrap;
  }
  .tab-nav button {
    flex:1 1 0; min-width:90px;
    background:transparent; border:none;
    padding:9px 14px; border-radius:7px;
    font-size:13.5px; font-weight:600;
    color:var(--c-primary); cursor:pointer;
    font-family:inherit;
    transition:background .2s,color .2s,box-shadow .2s;
  }
  .tab-nav button:hover { background:var(--c-soft); }
  .tab-nav button.active {
    background:linear-gradient(120deg,var(--c-primary),#2c6ea8);
    color:#fff; box-shadow:0 2px 6px rgba(31,78,121,.25);
  }

  /* card */
  .card {
    background:#fff; border:1px solid var(--c-line);
    border-radius:10px; padding:18px 20px; margin-bottom:20px;
    box-shadow:0 2px 8px rgba(15,23,42,.04);
  }
  .card h2 {
    font-size:18px; margin:0 0 14px;
    color:var(--c-primary);
    border-left:5px solid var(--c-accent);
    padding:4px 0 4px 12px;
    display:flex; justify-content:space-between; align-items:center;
    flex-wrap:wrap; gap:10px;
  }
  .card h2 .card-meta {
    font-weight:400; color:#475569; font-size:14px; margin-right:auto; margin-left:10px;
  }
  .empty-msg {
    text-align:center; color:#94a3b8; padding:24px;
    background:#fafbfc; border:1px dashed var(--c-line); border-radius:8px;
    font-size:13px;
  }

  /* status badge */
  .status-badge {
    display:inline-block; padding:3px 10px; border-radius:12px;
    font-size:12px; font-weight:600; letter-spacing:.5px;
  }
  .status-badge.draft     { background:#fff8ec; color:#92400e; border:1px solid #f5d99a; }
  .status-badge.submitted { background:#e8f5e9; color:#137333; border:1px solid #b6dcb9; }
  .status-badge.empty     { background:#f0f1f3; color:#64748b; border:1px solid #d8dee6; }

  /* workday table (read-only) */
  table.wd {
    width:100%; border-collapse:collapse;
    background:#fff; border:1px solid #2b2b2b;
    font-size:12.5px; table-layout:fixed;
  }
  table.wd th, table.wd td {
    padding:6px 6px; border-right:1px solid #c8ced6; border-bottom:1px solid #c8ced6;
    word-break:break-word; white-space:normal; vertical-align:middle;
  }
  table.wd th:last-child, table.wd td:last-child { border-right:none; }
  table.wd thead th {
    background:#2b2b2b; color:#fff; font-size:12px;
    line-height:1.35; text-align:center;
    border-right:1px solid #555; border-bottom:1px solid #2b2b2b;
  }
  table.wd thead th:last-child { border-right:none; }
  table.wd tr.category-row td {
    color:#fff; font-weight:700; font-size:14px;
    padding:8px 12px; text-align:left;
    border-right:1px solid rgba(255,255,255,.25);
    border-bottom:1px solid #c8ced6;
  }
  table.wd tr.category-row td:last-child { border-right:none; }
  table.wd tr.cat-meeting  td { background:#3a6bb2; }
  table.wd tr.cat-service  td { background:#cb7a3a; }
  table.wd tr.cat-web      td { background:#1f4e79; }
  table.wd tr.cat-project  td { background:#5e4d96; }
  table.wd tr.cat-internal td { background:#3e8e7e; }
  table.wd tr.cat-pending  td { background:#6e7a8a; }
  table.wd tbody tr.item td { background:#fff; }
  table.wd tbody tr.item:hover td { background:#fbfcfe; }
  table.wd td.num { text-align:right; }
  table.wd td.center, table.wd th.center { text-align:center; }
  table.wd .empty-cat td {
    background:#fafbfc; color:#94a3b8; text-align:center;
    font-size:12px; padding:8px;
  }
  table.wd td.multiline { white-space:pre-wrap; word-break:break-word; }

  /* col widths (與個人頁一致) */
  table.wd colgroup col.c-case   { width:13%; }
  table.wd colgroup col.c-type   { width:5%;  }
  table.wd colgroup col.c-date   { width:7%;  }
  table.wd colgroup col.c-hour   { width:6%;  }
  table.wd colgroup col.c-plugin { width:4%;  }
  table.wd colgroup col.c-prog   { width:5%;  }
  table.wd colgroup col.c-note   { width:28%; }

  /* history list */
  .history-item {
    background:#fff; border:1px solid var(--c-line);
    border-radius:8px; margin-bottom:10px; overflow:hidden;
  }
  .history-item > summary {
    cursor:pointer; padding:12px 16px; list-style:none;
    display:flex; align-items:center; gap:12px;
    font-weight:600; color:var(--c-primary);
    user-select:none;
  }
  .history-item > summary::-webkit-details-marker { display:none; }
  .history-item > summary::before {
    content:"▶"; font-size:11px; color:#94a3b8;
    transition:transform .2s;
  }
  .history-item[open] > summary::before { transform:rotate(90deg); }
  .history-item > summary:hover { background:var(--c-soft); }
  .history-item .h-date { font-size:15px; }
  .history-item .h-meta { margin-left:auto; font-size:12px; color:#64748b; font-weight:400; }
  .history-item .h-body { padding:12px 16px 16px; border-top:1px solid var(--c-line); }

  @media print {
    body { background:#fff; }
    header { box-shadow:none; }
    .sync-bar, .page-nav, .tab-nav, .btn { display:none !important; }
    table.wd { box-shadow:none; }
  }
  @media (max-width: 900px) {
    .wrap { padding:16px 12px 60px; }
    header { padding:18px 18px 14px; }
    header h1 { font-size:20px; }
    table.wd { font-size:11.5px; }
  }
</style>
</head>
<body>
<div class="wrap">

<nav class="page-nav" aria-label="分頁選單">
  <a href="Design_Department.html">案件安排</a>
  <a href="Workday.html" class="active">工作日報</a>
  <a href="reward.html">獎金</a>
  <a href="other.html">其他</a>
  <a href="Static_Pages.html">靜態頁</a>
  <a href="Jimmy.html">Jimmy</a>
  <a href="Joey.html">Joey</a>
  <a href="Cat.html">Cat</a>
  <a href="Mavis.html">Mavis</a>
</nav>

<header>
  <h1>設計部 工作日報 - 多人檢視</h1>
  <div class="meta">唯讀模式 ｜ 編輯請至各自的個人日報頁</div>
</header>

<div class="sync-bar">
  <div>狀態：<span class="status" id="syncStatus" data-level="info">準備中…</span></div>
  <div class="btns">
    <button class="btn" id="btnReload" type="button">重新讀取</button>
  </div>
</div>

<nav class="tab-nav" id="tabNav" aria-label="檢視切換">
  <button type="button" class="tab-btn active" data-tab="all">全部</button>
  <button type="button" class="tab-btn" data-tab="Jimmy">Jimmy</button>
  <button type="button" class="tab-btn" data-tab="Joey">Joey</button>
  <button type="button" class="tab-btn" data-tab="Cat">Cat</button>
  <button type="button" class="tab-btn" data-tab="Mavis">Mavis</button>
</nav>

<div id="content"></div>

<script>
(function(){
  // Apps Script Web App URL — 公開唯讀檢視用
  var CLOUD_URL = 'https://script.google.com/macros/s/AKfycbzgZZx6h_CGBHR3UusKInOa7E_lyuZtWKX_vn_4LUT2f-bl-huQzg2CKwE8ErcGtOAH/exec';
  var DESIGNERS = ['Jimmy', 'Joey', 'Cat', 'Mavis'];

  var CATEGORIES = [
    { key:'會議',     cls:'cat-meeting'  },
    { key:'前台客服', cls:'cat-service'  },
    { key:'網站建置', cls:'cat-web'      },
    { key:'專案',     cls:'cat-project'  },
    { key:'內部協助', cls:'cat-internal' },
    { key:'待處理項目', cls:'cat-pending' }
  ];

  var COLUMNS = [
    { key:'case',       label:'案件',       cls:''       },
    { key:'type',       label:'性質',       cls:''       },
    { key:'assigned',   label:'派案日期',   cls:'center' },
    { key:'dueDate',    label:'預定完成日期', cls:'center' },
    { key:'startDate',  label:'開始製作日期', cls:'center' },
    { key:'doneDate',   label:'實際完成日期', cls:'center' },
    { key:'estHours',   label:'預計總工時', cls:'num'    },
    { key:'todayHours', label:'今日工時',   cls:'num'    },
    { key:'plugin',     label:'插件',       cls:'center' },
    { key:'progress',   label:'進度',       cls:'num'    },
    { key:'note',       label:'進度說明',   cls:'',       multiline:true }
  ];

  var DATA = {}; // { Jimmy: { "YYYY-MM-DD": {status, items, ...} }, ... }
  var CURRENT_TAB = 'all';

  function $(id){ return document.getElementById(id); }
  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
    });
  }
  function todayKey(){
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function formatDateLabel(k){
    var p = k.split('-'); if (p.length < 3) return k;
    var d = new Date(parseInt(p[0],10), parseInt(p[1],10)-1, parseInt(p[2],10));
    var wd = ['日','一','二','三','四','五','六'][d.getDay()];
    return p[0] + '/' + p[1] + '/' + p[2] + '（' + wd + '）';
  }
  function showStatus(text, level){
    var el = $('syncStatus'); if (!el) return;
    el.textContent = text; el.dataset.level = level || 'info';
  }

  // ============ render ============
  function badgeHtml(rec){
    if (!rec) return '<span class="status-badge empty">未建立</span>';
    if (rec.status === 'submitted') {
      return '<span class="status-badge submitted">已送出 ' + escapeHtml(rec.submittedAt || '') + '</span>';
    }
    if (rec.status === 'draft') {
      return '<span class="status-badge draft">草稿 ' + escapeHtml(rec.updatedAt || '') + '</span>';
    }
    return '<span class="status-badge empty">未建立</span>';
  }

  function renderTable(items){
    var grouped = {};
    CATEGORIES.forEach(function(c){ grouped[c.key] = []; });
    (items || []).forEach(function(it){
      var c = it.category || '會議';
      if (!grouped[c]) grouped[c] = [];
      grouped[c].push(it);
    });

    var thead = '<thead><tr>' +
      COLUMNS.map(function(c){ return '<th class="' + c.cls + '">' + c.label + '</th>'; }).join('') +
      '</tr></thead>';

    var colgroup = '<colgroup>' +
      '<col class="c-case"><col class="c-type">' +
      '<col class="c-date"><col class="c-date"><col class="c-date"><col class="c-date">' +
      '<col class="c-hour"><col class="c-hour">' +
      '<col class="c-plugin"><col class="c-prog"><col class="c-note">' +
      '</colgroup>';

    var body = '';
    CATEGORIES.forEach(function(cat){
      var rows = grouped[cat.key] || [];
      body += '<tr class="category-row ' + cat.cls + '"><td colspan="' + COLUMNS.length + '">' +
        escapeHtml(cat.key) + '</td></tr>';
      if (rows.length === 0) {
        body += '<tr class="empty-cat"><td colspan="' + COLUMNS.length + '">（無）</td></tr>';
      } else {
        rows.forEach(function(it){
          body += '<tr class="item">';
          COLUMNS.forEach(function(col){
            var val = it[col.key] == null ? '' : it[col.key];
            if (col.key === 'progress' && val !== '' && val != null) {
              var ps = String(val).trim();
              var pn = parseFloat(ps.endsWith('%') ? ps.slice(0, -1) : ps);
              if (!isNaN(pn)) {
                if (pn > 0 && pn < 1) pn = Math.round(pn * 10000) / 100;
                val = pn + '%';
              } else {
                val = ps.endsWith('%') ? ps : ps + '%';
              }
            }
            body += '<td class="' + col.cls + (col.multiline ? ' multiline' : '') + '">' + escapeHtml(val) + '</td>';
          });
          body += '</tr>';
        });
      }
    });

    return '<table class="wd">' + colgroup + thead + '<tbody>' + body + '</tbody></table>';
  }

  function yesterdayKey(){
    var d = new Date();
    d.setDate(d.getDate() - 1);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function renderOverview(){
    var key = yesterdayKey();
    var html = '';
    DESIGNERS.forEach(function(name){
      var data = DATA[name] || {};
      var rec = data[key];
      html += '<section class="card">';
      html += '<h2><span>' + escapeHtml(name) + '</span>' +
              '<span class="card-meta">' + escapeHtml(formatDateLabel(key)) + '</span>' +
              badgeHtml(rec) + '</h2>';
      if (rec && rec.items && rec.items.length > 0) {
        html += renderTable(rec.items);
      } else {
        html += '<div class="empty-msg">' + escapeHtml(name) + ' 前一日無日報</div>';
      }
      html += '</section>';
    });
    return html;
  }

  function renderDesigner(name){
    var data = DATA[name] || {};
    var today = todayKey();
    var todayRec = data[today];
    var html = '';

    // 今日
    html += '<section class="card">';
    html += '<h2><span>' + escapeHtml(name) + ' 今日日報</span>' +
            '<span class="card-meta">' + escapeHtml(formatDateLabel(today)) + '</span>' +
            badgeHtml(todayRec) + '</h2>';
    if (todayRec && todayRec.items && todayRec.items.length > 0) {
      html += renderTable(todayRec.items);
    } else {
      html += '<div class="empty-msg">今日尚未建立日報</div>';
    }
    html += '</section>';

    // 歷史
    var keys = Object.keys(data).filter(function(k){ return k !== today; }).sort().reverse();
    html += '<section class="card">';
    html += '<h2><span>' + escapeHtml(name) + ' 歷史日報</span></h2>';
    if (keys.length === 0) {
      html += '<div class="empty-msg">尚未有歷史日報</div>';
    } else {
      keys.forEach(function(k){
        var rec = data[k];
        var count = (rec.items || []).length;
        html += '<details class="history-item">';
        html += '<summary>' +
                '<span class="h-date">' + escapeHtml(formatDateLabel(k)) + '</span>' +
                badgeHtml(rec) +
                '<span class="h-meta">共 ' + count + ' 項</span>' +
                '</summary>';
        html += '<div class="h-body">' + renderTable(rec.items || []) + '</div>';
        html += '</details>';
      });
    }
    html += '</section>';

    return html;
  }

  function renderContent(){
    if (CURRENT_TAB === 'all') {
      $('content').innerHTML = renderOverview();
    } else {
      $('content').innerHTML = renderDesigner(CURRENT_TAB);
    }
  }

  // ============ fetch ============
  async function fetchOne(name){
    var url = CLOUD_URL + '?author=' + encodeURIComponent(name);
    var res = await fetch(url);
    if (!res.ok) throw new Error(name + ' HTTP ' + res.status);
    var json = await res.json();
    if (!json.ok) throw new Error(name + ' ' + (json.error || '伺服器錯誤'));
    return json.data || {};
  }

  async function fetchAll(){
    showStatus('連線中…', 'busy');
    try {
      var results = await Promise.all(DESIGNERS.map(fetchOne));
      DESIGNERS.forEach(function(name, i){ DATA[name] = results[i]; });
      renderContent();
      var t = new Date();
      var hh = String(t.getHours()).padStart(2,'0'), mm = String(t.getMinutes()).padStart(2,'0');
      showStatus('已同步 ' + hh + ':' + mm, 'ok');
    } catch(err){
      showStatus('連線失敗：' + err.message, 'err');
    }
  }

  // ============ tabs ============
  function bindTabs(){
    document.querySelectorAll('.tab-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        CURRENT_TAB = btn.dataset.tab;
        renderContent();
      });
    });
  }

  // ============ init ============
  document.addEventListener('DOMContentLoaded', function(){
    $('btnReload').addEventListener('click', fetchAll);
    bindTabs();
    renderContent();
    fetchAll();
  });
})();
</script>
</body>
</html>
